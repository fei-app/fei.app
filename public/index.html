<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EtapaApp</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- JSZip para criação de ZIP client-side -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-graduation-cap"></i>EtapaApp (BETA)</h1>
        </header>

        <div class="search-section">
            <div class="search-actions">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Buscar arquivos ou pastas..." autocomplete="off">
                </div>
                <div class="info-tooltip">
                    <i class="fas fa-info-circle info-icon"></i>
                    <span class="tooltip-text">A busca ocorre somente no diretório atual, não é suportada busca global relativa.</span>
                </div>
                <button id="downloadAllBtn" class="action-btn">
                    <i class="fas fa-file-archive"></i> Baixar todas as provas
                </button>
            </div>
        </div>

        <div class="breadcrumb-area">
            <nav id="breadcrumb" aria-label="Caminho atual">
                <span class="breadcrumb-root"><i class="fas fa-folder-open"></i> Raiz</span>
            </nav>
        </div>

        <div class="loading-area" id="loadingArea">
            <div class="spinner"></div>
            <span>Carregando...</span>
        </div>

        <div id="errorArea" class="error-area" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage">Erro ao carregar os dados.</span>
            <button id="retryButton" class="retry-btn">Tentar novamente</button>
        </div>

        <div id="itemsContainer" class="items-list">
            <!-- Itens serão inseridos dinamicamente -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
